name: Build & publish wheels

# Trigger manually from the Actions tab, or by pushing a version tag (vX.Y.Z).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Reliable platforms: Linux glibc+musl (x86_64, aarch64) and macOS Apple Silicon.
  wheels:
    name: wheels ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: x86_64,  cibw_archs: x86_64,  nanoe5_arch: avx2 }
          - { os: ubuntu-latest, arch: aarch64, cibw_archs: aarch64, nanoe5_arch: portable }
          - { os: macos-14,      arch: arm64,   cibw_archs: arm64,   nanoe5_arch: portable }
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (aarch64 emulation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT: "NANOE5_ARCH=${{ matrix.nanoe5_arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  # macOS Intel runners are frequently slow to allocate, so keep this OFF the
  # critical path: it has its own publish and never blocks the release.
  wheels_macos_intel:
    name: wheels macos-13 x86_64 (best-effort)
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: x86_64
          CIBW_ENVIRONMENT: "NANOE5_ARCH=avx2"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-13-x86_64
          path: ./wheelhouse/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # Publish the reliable wheels + sdist as soon as they're ready.
  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # Publish the macOS Intel wheel whenever it finishes (idempotent, skip-existing).
  publish_macos_intel:
    name: publish macOS Intel wheel
    needs: [wheels_macos_intel]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
