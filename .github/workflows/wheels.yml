name: Build & publish wheels

# Trigger manually from the Actions tab, or by pushing a version tag (vX.Y.Z).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  wheels:
    name: wheels ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc + musl)  -> AVX2 fast path
          - { os: ubuntu-latest, arch: x86_64,  cibw_archs: x86_64,  nanoe5_arch: avx2 }
          # Linux aarch64 (glibc + musl) via QEMU -> portable/NEON
          - { os: ubuntu-latest, arch: aarch64, cibw_archs: aarch64, nanoe5_arch: portable }
          # macOS Intel -> AVX2
          - { os: macos-13,      arch: x86_64,  cibw_archs: x86_64,  nanoe5_arch: avx2 }
          # macOS Apple Silicon -> portable/NEON
          - { os: macos-14,      arch: arm64,   cibw_archs: arm64,   nanoe5_arch: portable }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (aarch64 emulation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT: "NANOE5_ARCH=${{ matrix.nanoe5_arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # only publish on manual dispatch or a version tag
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true        # don't fail if the sdist/version already exists
